<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown to Image</title>
    <style>
      :root {
        --bg: #f4efe6;
        --bg-deep: #e8dfd1;
        --surface: rgba(255, 251, 245, 0.78);
        --surface-strong: rgba(255, 248, 239, 0.95);
        --surface-hover: #fffaf2;
        --surface-muted: rgba(241, 233, 220, 0.88);
        --border: rgba(112, 85, 54, 0.18);
        --border-strong: rgba(90, 64, 39, 0.34);
        --text: #2b2118;
        --text-muted: #7e6b58;
        --primary: #8d5a2b;
        --primary-hover: #73461f;
        --primary-soft: rgba(141, 90, 43, 0.12);
        --shadow: 0 22px 60px rgba(71, 49, 28, 0.11);
        --shadow-strong: 0 32px 90px rgba(62, 41, 21, 0.16);
        --page-bg: #fffdf8;
        --page-text: #241c15;
        --reading-line: rgba(122, 96, 69, 0.09);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, "Noto Serif SC", "Source Han Serif SC", Georgia, serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        position: relative;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.75), transparent 34%),
          radial-gradient(circle at 85% 16%, rgba(213, 183, 148, 0.26), transparent 24%),
          linear-gradient(135deg, rgba(255, 255, 255, 0.45), transparent 44%);
        opacity: 0.8;
      }

      body::after {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.08;
        background-image:
          linear-gradient(rgba(74, 54, 35, 0.6) 1px, transparent 1px),
          linear-gradient(90deg, rgba(74, 54, 35, 0.35) 1px, transparent 1px);
        background-size: 140px 140px;
        mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.9), transparent 88%);
      }

      /* Header */
      .header {
        padding: 22px 32px 18px;
        border-bottom: 1px solid rgba(90, 64, 39, 0.12);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        flex-wrap: wrap;
        position: relative;
        z-index: 1;
      }

      .header h1 {
        font-family: "Didot", "Bodoni 72", "Baskerville", "Songti SC", serif;
        font-size: 30px;
        line-height: 1;
        font-weight: 700;
        letter-spacing: 0.02em;
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .header h1::before {
        content: '';
        width: 24px;
        height: 24px;
        border: 1px solid rgba(141, 90, 43, 0.25);
        box-shadow: inset 0 0 0 5px rgba(255, 251, 244, 0.8);
        background: var(--primary);
        border-radius: 999px;
      }

      .header::after {
        content: '';
        position: absolute;
        left: 32px;
        right: 32px;
        bottom: 0;
        height: 1px;
        background: linear-gradient(90deg, rgba(141, 90, 43, 0.42), rgba(141, 90, 43, 0.08), transparent);
      }

      .toolbar {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      button {
        padding: 11px 18px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--surface);
        backdrop-filter: blur(14px);
        color: var(--text);
        font-family: "Avenir Next", "PingFang SC", "Helvetica Neue", sans-serif;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s ease, background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        display: flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 8px 20px rgba(78, 56, 34, 0.06);
      }

      button:hover {
        background: var(--surface-hover);
        border-color: var(--primary);
        transform: translateY(-1px);
        box-shadow: 0 12px 24px rgba(78, 56, 34, 0.12);
      }

      button.primary {
        background: var(--primary);
        color: #fffaf4;
        border-color: var(--primary);
        box-shadow: 0 14px 30px rgba(121, 73, 32, 0.2);
      }

      button.primary:hover {
        background: var(--primary-hover);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* Main Layout */
      .main {
        flex: 1;
        display: flex;
        min-height: 0;
        overflow: hidden;
        padding: 24px;
        gap: 22px;
        position: relative;
        z-index: 1;
      }

      @media (max-width: 1024px) {
        .main {
          flex-direction: column;
          padding: 18px;
        }
      }

      /* Editor Panel */
      .editor-panel {
        width: 430px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        flex-shrink: 0;
        border: 1px solid var(--border);
        background:
          linear-gradient(180deg, rgba(255, 252, 247, 0.92), rgba(249, 241, 230, 0.92)),
          repeating-linear-gradient(
            to bottom,
            transparent 0,
            transparent 35px,
            var(--reading-line) 35px,
            var(--reading-line) 36px
          );
        border-radius: 28px;
        box-shadow: var(--shadow);
        position: relative;
      }

      @media (max-width: 1024px) {
        .editor-panel {
          width: 100%;
          height: 360px;
        }
      }

      .editor-panel::before {
        content: '';
        position: absolute;
        top: 22px;
        left: 22px;
        width: 56px;
        height: 56px;
        border-top: 1px solid rgba(122, 88, 54, 0.18);
        border-left: 1px solid rgba(122, 88, 54, 0.18);
        border-radius: 18px 0 0 0;
        pointer-events: none;
      }

      .panel-header {
        padding: 20px 22px 16px;
        border-bottom: 1px solid rgba(122, 88, 54, 0.12);
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--text-muted);
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: "Avenir Next", "PingFang SC", sans-serif;
      }

      .editor-wrapper {
        flex: 1;
        overflow: auto;
        position: relative;
        isolation: isolate;
        padding: 8px 0;
      }

      textarea {
        width: 100%;
        height: 100%;
        padding: 20px 22px 28px;
        border: none;
        background: transparent;
        color: var(--text);
        font-family: "SF Mono", "JetBrains Mono", "Cascadia Code", monospace;
        font-size: 13px;
        line-height: 2.75;
        letter-spacing: 0.01em;
        resize: none;
        outline: none;
        tab-size: 2;
        display: block;
        overflow: auto;
      }

      textarea::placeholder {
        color: var(--text-muted);
      }

      /* Preview Panel */
      .preview-panel {
        flex: 1;
        overflow: auto;
        padding: 28px 30px 40px;
        background:
          linear-gradient(180deg, rgba(255, 252, 248, 0.58), rgba(234, 223, 208, 0.54)),
          radial-gradient(circle at top right, rgba(205, 176, 141, 0.22), transparent 32%);
        border: 1px solid rgba(122, 88, 54, 0.13);
        border-radius: 32px;
        box-shadow: var(--shadow-strong);
        position: relative;
      }

      .preview-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 36px;
        padding-bottom: 40px;
      }

      .preview-panel::before {
        content: '';
        position: absolute;
        inset: 18px;
        border: 1px solid rgba(122, 88, 54, 0.08);
        border-radius: 24px;
        pointer-events: none;
      }

      /* Page Card */
      .page-card {
        position: relative;
        background: var(--page-bg);
        border-radius: 20px;
        border: 1px solid rgba(122, 88, 54, 0.12);
        box-shadow: 0 24px 64px rgba(78, 56, 34, 0.18);
        overflow: hidden;
        flex-shrink: 0;
        max-width: 100%;
        padding-top: 18px;
      }

      .page-card canvas {
        max-width: 100%;
        height: auto;
        display: block;
      }

      .page-label {
        position: absolute;
        top: 20px;
        left: 22px;
        font-size: 12px;
        color: var(--text-muted);
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        font-family: "Avenir Next", "PingFang SC", sans-serif;
      }

      .page-canvas {
        display: block;
      }

      /* Loading State */
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 200px;
        color: var(--text-muted);
        font-size: 14px;
        gap: 12px;
        font-family: "Avenir Next", "PingFang SC", sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(141, 90, 43, 0.18);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* Empty State */
      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--text-muted);
        gap: 16px;
        text-align: center;
        padding: 40px;
      }

      .empty-icon {
        width: 72px;
        height: 72px;
        border: 1px dashed rgba(122, 88, 54, 0.34);
        background: rgba(255, 251, 245, 0.72);
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
        box-shadow: 0 10px 22px rgba(78, 56, 34, 0.08);
      }

      /* Settings Panel */
      .settings {
        padding: 16px 18px 18px;
        border-top: 1px solid rgba(122, 88, 54, 0.12);
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: linear-gradient(180deg, rgba(255, 251, 245, 0.75), rgba(245, 235, 221, 0.92));
      }

      .setting-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 10px;
        border-radius: 16px;
        background: rgba(255, 251, 246, 0.54);
        border: 1px solid rgba(122, 88, 54, 0.08);
      }

      .setting-label {
        font-size: 12px;
        color: var(--text-muted);
        font-family: "Avenir Next", "PingFang SC", sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      select, input[type="number"] {
        padding: 8px 11px;
        border: 1px solid rgba(122, 88, 54, 0.12);
        border-radius: 12px;
        background: var(--surface-strong);
        color: var(--text);
        font-size: 12px;
        min-width: 100px;
        font-family: "Avenir Next", "PingFang SC", sans-serif;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
      }

      select:focus, input[type="number"]:focus, textarea:focus {
        outline: none;
        border-color: rgba(141, 90, 43, 0.4);
        box-shadow: 0 0 0 4px var(--primary-soft);
      }

      input[type="number"] {
        width: 80px;
      }

      .editor-wrapper::-webkit-scrollbar,
      .preview-panel::-webkit-scrollbar {
        width: 12px;
        height: 12px;
      }

      .editor-wrapper::-webkit-scrollbar-thumb,
      .preview-panel::-webkit-scrollbar-thumb {
        background: rgba(133, 102, 67, 0.28);
        border-radius: 999px;
        border: 3px solid transparent;
        background-clip: padding-box;
      }

      .editor-wrapper::-webkit-scrollbar-track,
      .preview-panel::-webkit-scrollbar-track {
        background: transparent;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <h1>Markdown to Image</h1>
      <div class="toolbar">
        <button id="btnLoadSample">Load Sample</button>
        <button id="btnClear">Clear</button>
        <button id="btnDownloadAll" class="primary">Download All</button>
      </div>
    </header>

    <main class="main">
      <div class="editor-panel">
        <div class="panel-header">
          <span>Markdown Input</span>
          <span id="charCount">0 chars</span>
        </div>
        <div class="editor-wrapper">
          <textarea
            id="editor"
            placeholder="Enter your Markdown here..."
            spellcheck="false"
          ></textarea>
        </div>
        <div class="settings">
          <div class="setting-row">
            <span class="setting-label">Theme</span>
            <select id="themeSelect">
              <option value="editorial" selected>editorial</option>
              <option value="mint">mint</option>
            </select>
          </div>
          <div class="setting-row">
            <span class="setting-label">Font Size</span>
            <select id="fontSizeSelect">
              <option value="24">24px</option>
              <option value="26">26px</option>
              <option value="28">28px</option>
              <option value="30" selected>30px</option>
              <option value="32">32px</option>
              <option value="34">34px</option>
              <option value="36">36px</option>
              <option value="38">38px</option>
              <option value="40">40px</option>
              <option value="42">42px</option>
              <option value="44">44px</option>
              <option value="46">46px</option>
              <option value="48">48px</option>
              <option value="50">50px</option>
            </select>
          </div>
          <div class="setting-row">
            <span class="setting-label">Page Width</span>
            <input type="number" id="pageWidth" value="1080" min="600" max="1440" step="10" />
          </div>
          <div class="setting-row">
            <span class="setting-label">Page Height</span>
            <input type="number" id="pageHeight" value="1440" min="800" max="1920" step="10" />
          </div>
        </div>
      </div>

      <div class="preview-panel">
        <div id="previewContainer" class="preview-container">
          <div class="empty-state">
            <div class="empty-icon">📝</div>
            <p>Enter Markdown on the left<br>Images will be generated automatically</p>
          </div>
        </div>
      </div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
