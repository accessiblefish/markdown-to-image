<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown to Image</title>
    <style>
      :root {
        --bg: #0f0f11;
        --surface: #18181b;
        --surface-hover: #27272a;
        --border: #3f3f46;
        --text: #fafafa;
        --text-muted: #a1a1aa;
        --primary: #22d3ee;
        --primary-hover: #06b6d4;
        --page-bg: #ffffff;
        --page-text: #1a1a1a;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
      }

      /* Header */
      .header {
        padding: 16px 24px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
      }

      .header h1 {
        font-size: 18px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .header h1::before {
        content: '';
        width: 8px;
        height: 8px;
        background: var(--primary);
        border-radius: 50%;
      }

      .toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      button {
        padding: 8px 16px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--surface);
        color: var(--text);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s ease;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      button:hover {
        background: var(--surface-hover);
        border-color: var(--primary);
      }

      button.primary {
        background: var(--primary);
        color: #0f172a;
        border-color: var(--primary);
      }

      button.primary:hover {
        background: var(--primary-hover);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* Main Layout */
      .main {
        flex: 1;
        display: flex;
        min-height: 0;
        overflow: hidden;
      }

      @media (max-width: 1024px) {
        .main {
          flex-direction: column;
        }
      }

      /* Editor Panel */
      .editor-panel {
        width: 400px;
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        flex-shrink: 0;
      }

      @media (max-width: 1024px) {
        .editor-panel {
          width: 100%;
          height: 300px;
        }
      }

      .panel-header {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .editor-wrapper {
        flex: 1;
        overflow: auto;
        position: relative;
        isolation: isolate;
      }

      textarea {
        width: 100%;
        height: 100%;
        padding: 16px;
        border: none;
        background: transparent;
        color: var(--text);
        font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
        font-size: 13px;
        line-height: 1.6;
        resize: none;
        outline: none;
        tab-size: 2;
        display: block;
        overflow: auto;
      }

      textarea::placeholder {
        color: var(--text-muted);
      }

      /* Preview Panel */
      .preview-panel {
        flex: 1;
        overflow: auto;
        padding: 24px;
        background: #0a0a0c;
      }

      .preview-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        padding-bottom: 40px;
      }

      /* Page Card */
      .page-card {
        position: relative;
        background: var(--page-bg);
        border-radius: 8px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        flex-shrink: 0;
        max-width: 100%;
      }

      .page-card canvas {
        max-width: 100%;
        height: auto;
        display: block;
      }

      .page-label {
        position: absolute;
        top: -28px;
        left: 0;
        font-size: 12px;
        color: var(--text-muted);
        font-weight: 500;
      }

      .page-canvas {
        display: block;
      }

      /* Loading State */
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 200px;
        color: var(--text-muted);
        font-size: 14px;
        gap: 10px;
      }

      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid var(--border);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* Empty State */
      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--text-muted);
        gap: 16px;
        text-align: center;
        padding: 40px;
      }

      .empty-icon {
        width: 64px;
        height: 64px;
        border: 2px dashed var(--border);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
      }

      /* Settings Panel */
      .settings {
        padding: 12px 16px;
        border-top: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .setting-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .setting-label {
        font-size: 12px;
        color: var(--text-muted);
      }

      select, input[type="number"] {
        padding: 6px 10px;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: var(--surface);
        color: var(--text);
        font-size: 12px;
        min-width: 100px;
      }

      input[type="number"] {
        width: 80px;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <h1>Markdown to Image</h1>
      <div class="toolbar">
        <button id="btnLoadSample">Load Sample</button>
        <button id="btnClear">Clear</button>
        <button id="btnDownloadAll" class="primary">Download All</button>
      </div>
    </header>

    <main class="main">
      <div class="editor-panel">
        <div class="panel-header">
          <span>Markdown Input</span>
          <span id="charCount">0 chars</span>
        </div>
        <div class="editor-wrapper">
          <textarea
            id="editor"
            placeholder="Enter your Markdown here..."
            spellcheck="false"
          ></textarea>
        </div>
        <div class="settings">
          <div class="setting-row">
            <span class="setting-label">Theme</span>
            <select id="themeSelect">
              <option value="light">Light</option>
              <option value="dark">Dark</option>
              <option value="sepia">Sepia</option>
            </select>
          </div>
          <div class="setting-row">
            <span class="setting-label">Font Size</span>
            <select id="fontSizeSelect">
              <option value="30">30px</option>
              <option value="32">32px</option>
              <option value="34" selected>34px</option>
              <option value="36">36px</option>
              <option value="38">38px</option>
              <option value="40">40px</option>
              <option value="42">42px</option>
              <option value="44">44px</option>
              <option value="46">46px</option>
              <option value="48">48px</option>
              <option value="50">50px</option>
            </select>
          </div>
          <div class="setting-row">
            <span class="setting-label">Page Width</span>
            <input type="number" id="pageWidth" value="1080" min="600" max="1440" step="10" />
          </div>
          <div class="setting-row">
            <span class="setting-label">Page Height</span>
            <input type="number" id="pageHeight" value="1440" min="800" max="1920" step="10" />
          </div>
        </div>
      </div>

      <div class="preview-panel">
        <div id="previewContainer" class="preview-container">
          <div class="empty-state">
            <div class="empty-icon">📝</div>
            <p>Enter Markdown on the left<br>Images will be generated automatically</p>
          </div>
        </div>
      </div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
